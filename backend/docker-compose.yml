services:
  postgres:
    image: postgres:15
    container_name: fraud_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-fraud_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-fraud_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: fraud_redis
    restart: always
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: fraud_neo4j
    restart: always
    env_file: [.env]
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
    volumes:
      - neo4j_data:/data
      - ./docker/neo4j:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_PASSWORD:-password} 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 10

  geo-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: geo-agent
        PORT: 8002
    container_name: geo_agent
    env_file: [.env]
    environment:
      SERVICE: geo-agent
      PORT: 8002
      REDIS_HOST: redis
    ports: ["8002:8002"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port = os.environ.get('PORT', '8002'); urllib.request.urlopen('http://127.0.0.1:%s/health' % port, timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  velocity-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: velocity-agent
        PORT: 8001
    container_name: velocity_agent
    env_file: [.env]
    environment:
      SERVICE: velocity-agent
      PORT: 8001
      REDIS_HOST: redis
    ports: ["8001:8001"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port = os.environ.get('PORT', '8001'); urllib.request.urlopen('http://127.0.0.1:%s/health' % port, timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  behavior-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: behavior-agent
        PORT: 8003
    container_name: behavior_agent
    env_file: [.env]
    environment:
      SERVICE: behavior-agent
      PORT: 8003
      MODELS_DIR: /app/ml/models
      REDIS_HOST: redis
    ports: ["8003:8003"]
    volumes:
      - ./ml/models:/app/ml/models
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port = os.environ.get('PORT', '8003'); urllib.request.urlopen('http://127.0.0.1:%s/health' % port, timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  synthesis-agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: synthesis-agent
        PORT: 8004
    container_name: synthesis_agent
    env_file: [.env]
    environment:
      SERVICE: synthesis-agent
      PORT: 8004
      REDIS_HOST: redis
    ports: ["8004:8004"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port = os.environ.get('PORT', '8004'); urllib.request.urlopen('http://127.0.0.1:%s/health' % port, timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  decision-otp-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: decision-otp-service
        PORT: 8005
    container_name: decision_otp_service
    env_file: [.env]
    environment:
      SERVICE: decision-otp-service
      PORT: 8005
      REDIS_HOST: redis
    ports: ["8005:8005"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port = os.environ.get('PORT', '8005'); urllib.request.urlopen('http://127.0.0.1:%s/health' % port, timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
        PORT: 8000
    container_name: fraud_api_gateway
    env_file: [.env]
    environment:
      SERVICE: api-gateway
      PORT: 8000
      REDIS_HOST: redis
      VELOCITY_AGENT_URL: http://velocity-agent:8001
      GEO_AGENT_URL: http://geo-agent:8002
      BEHAVIOR_AGENT_URL: http://behavior-agent:8003
      SYNTHESIS_AGENT_URL: http://synthesis-agent:8004
      DECISION_OTP_URL: http://decision-otp-service:8005
    ports: ["8000:8000"]
    depends_on:
      redis:
        condition: service_healthy
      geo-agent:
        condition: service_healthy
      velocity-agent:
        condition: service_healthy
      behavior-agent:
        condition: service_healthy
      synthesis-agent:
        condition: service_healthy
      decision-otp-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; port = os.environ.get('PORT', '8000'); urllib.request.urlopen('http://127.0.0.1:%s/health' % port, timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  neo4j_data:
  redis_data:
