# Redis configuration — AOF persistence enabled for stream durability.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Stream trimming defaults
stream-node-max-bytes 4096
stream-node-max-entries 100

# Memory policy (streams + OTP state)
maxmemory-policy allkeys-lru

save 900 1
save 300 10
save 60 10000
